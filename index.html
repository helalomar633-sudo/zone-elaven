<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone | Premium Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; overflow-x: hidden; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .shiny-purple { background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%); box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
        .card-hover:hover { transform: translateY(-10px); border-color: #a855f7; transition: all 0.3s ease; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center sticky top-0 z-50 glass">
        <div class="text-3xl font-bold tracking-tighter text-purple-500">ZONE</div>
        <ul class="hidden md:flex space-x-reverse space-x-8 text-sm uppercase tracking-widest">
            <li><a href="#" class="hover:text-purple-400 transition">الرئيسية</a></li>
            <li><a href="#services" class="hover:text-purple-400 transition">خدماتنا</a></li>
            <li><a href="#contact" class="hover:text-purple-400 transition">اتصل بنا</a></li>
        </ul>
    </nav>

    <section id="services" class="py-20 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-indigo-400">Our Premium Services</h2>
            <p class="text-slate-400">High-performance solutions for your digital growth</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="services-grid">
            </div>
    </section>

    <div id="service-modal" class="modal">
        <div class="glass max-w-2xl w-full p-8 rounded-3xl relative overflow-y-auto max-h-[90vh]">
            <button onclick="closeModal()" class="absolute top-4 left-4 text-slate-400 hover:text-white text-2xl">&times;</button>
            <img id="modal-img" src="" class="w-full h-64 object-cover rounded-2xl mb-6 shadow-lg shadow-purple-500/20">
            <h3 id="modal-title" class="text-3xl font-bold mb-4 text-purple-400"></h3>
            <p id="modal-desc" class="text-slate-300 text-lg leading-relaxed mb-6"></p>
            <div class="flex justify-between items-center border-t border-slate-700 pt-6">
                <span id="modal-price" class="text-2xl font-bold text-white"></span>
                <button class="shiny-purple px-8 py-3 rounded-xl font-bold">Buy Now</button>
            </div>
        </div>
    </div>

    <script>
        const services = [
            { id: 1, title: "Custom Web Development", price: "$999", img: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80", desc: "Tailor-made websites built with modern technologies like React, Vue, or Next.js. We ensure your site is fast, SEO-friendly, and mobile-responsive." },
            { id: 2, title: "Mobile App Design", price: "$1,500", img: "https://images.unsplash.com/photo-1512941937669-90a1b58e7e9c?auto=format&fit=crop&w=600&q=80", desc: "Stunning iOS and Android app designs that offer seamless user experiences and high engagement rates." },
            { id: 3, title: "SaaS Platform Building", price: "$4,999", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&w=600&q=80", desc: "Scalable Software-as-a-Service solutions with subscription management, user dashboards, and cloud integration." },
            { id: 4, title: "SEO Optimization", price: "$450", img: "https://images.unsplash.com/photo-1571721738239-6b32f131f337?auto=format&fit=crop&w=600&q=80", desc: "Boost your search engine rankings and drive organic traffic with our data-driven SEO strategies." },
            { id: 5, title: "UI/UX Audit", price: "$300", img: "https://images.unsplash.com/photo-1586717791821-3f44a563eb4c?auto=format&fit=crop&w=600&q=80", desc: "Detailed analysis of your product's user experience with actionable insights to improve conversion rates." },
            { id: 6, title: "Cloud Infrastructure", price: "$1,200", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=600&q=80", desc: "Setting up secure and scalable AWS/Azure environments to ensure 99.9% uptime for your business." },
            { id: 7, title: "E-Commerce Solutions", price: "$2,500", img: "https://images.unsplash.com/photo-1557821552-17105176677c?auto=format&fit=crop&w=600&q=80", desc: "Full-featured online stores with payment gateways, inventory management, and smooth checkout flows." },
            { id: 8, title: "AI/ML Integration", price: "$3,200", img: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=600&q=80", desc: "Implementing artificial intelligence and machine learning models to automate tasks and provide insights." },
            { id: 9, title: "Cybersecurity Setup", price: "$1,800", img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=600&q=80", desc: "Protecting your digital assets from threats with advanced encryption and firewall configurations." },
            { id: 10, title: "Brand Identity Design", price: "$800", img: "https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&w=600&q=80", desc: "Creating unique logos, color palettes, and typography that make your brand stand out from competitors." },
            { id: 11, title: "API Development", price: "$700", img: "https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?auto=format&fit=crop&w=600&q=80", desc: "Building robust RESTful and GraphQL APIs for seamless data exchange between different software." },
            { id: 12, title: "CRM Systems", price: "$2,200", img: "https://images.unsplash.com/photo-1552664730-d307ca884978?auto=format&fit=crop&w=600&q=80", desc: "Custom Customer Relationship Management tools to manage leads, clients, and sales pipelines efficiently." },
            { id: 13, title: "Blockchain Solutions", price: "$5,000", img: "https://images.unsplash.com/photo-1639762681485-074b7f938ba0?auto=format&fit=crop&w=600&q=80", desc: "Developing smart contracts and decentralized applications (dApps) on Ethereum or Solana." },
            { id: 14, title: "Quality Assurance (QA)", price: "$600", img: "https://images.unsplash.com/photo-1516116216624-53e697fedbea?auto=format&fit=crop&w=600&q=80", desc: "Rigorous manual and automated testing to ensure your software is bug-free and production-ready." },
            { id: 15, title: "DevOps Automation", price: "$1,400", img: "https://images.unsplash.com/photo-1618401471353-b98aadebc25b?auto=format&fit=crop&w=600&q=80", desc: "CI/CD pipeline integration to speed up deployment cycles and improve software reliability." }
        ];

        const grid = document.getElementById('services-grid');

        services.forEach(service => {
            const card = `
                <div class="glass rounded-3xl overflow-hidden card-hover group">
                    <img src="${service.img}" class="w-full h-48 object-cover group-hover:scale-105 transition duration-500">
                    <div class="p-6">
                        <h3 class="text-xl font-bold mb-2 text-purple-300">${service.title}</h3>
                        <p class="text-slate-400 text-sm mb-4 line-clamp-2">${service.desc}</p>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-2xl font-bold text-white">${service.price}</span>
                            <span class="text-xs text-purple-400 uppercase tracking-tighter">Premium Service</span>
                        </div>
                        <div class="flex gap-2">
                            <button class="flex-1 shiny-purple py-2 rounded-lg font-bold text-sm">Buy Now</button>
                            <button onclick="openModal(${service.id})" class="flex-1 border border-slate-700 hover:bg-white hover:text-black py-2 rounded-lg font-bold text-sm transition">Details</button>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });

        function openModal(id) {
            const service = services.find(s => s.id === id);
            document.getElementById('modal-img').src = service.img;
            document.getElementById('modal-title').innerText = service.title;
            document.getElementById('modal-desc').innerText = service.desc;
            document.getElementById('modal-price').innerText = service.price;
            document.getElementById('service-modal').classList.add('active');
            document.body.style.overflow = 'hidden'; // Stop scrolling
        }

        function closeModal() {
            document.getElementById('service-modal').classList.remove('active');
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            if (event.target == document.getElementById('service-modal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
